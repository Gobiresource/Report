<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Говь Ресурс Девелопмент ХХК — Нэвтрэх</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='10' fill='%2315171A'/%3E%3Cpath d='M9 27 24 11 39 27' stroke='%23E3A538' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M5 35 24 19 43 35' stroke='%23E3A538' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round' opacity='.55'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body" data-page="login">
  <main class="login-shell">
    <div class="brand-block">
      <div class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 27 24 11 39 27" stroke="#E3A538" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 35 24 19 43 35" stroke="#E3A538" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity=".62"/>
          <path d="M2 41 24 27 46 41" stroke="#E3A538" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity=".32"/>
        </svg>
      </div>
      <h1 class="brand-title">Говь Ресурс Девелопмент</h1>
      <p class="brand-subtitle">Өдөр тутмын үйл ажиллагааны систем</p>
    </div>

    <section class="access-panel bezel">
      <span class="tick-a"></span><span class="tick-b"></span>
      <div class="access-head">
        <p class="eyebrow">Хандалтын самбар</p>
        <h2>Нэвтрэх</h2>
      </div>
      <form id="loginForm" autocomplete="on">
        <div id="loginMessage"></div>
        <div class="field">
          <label for="username">Нэвтрэх нэр</label>
          <input id="username" name="username" type="text" placeholder="жишээ: teever" required autocomplete="username">
        </div>
        <div class="field">
          <label for="pin">PIN код</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" class="pin-input" placeholder="••••" required autocomplete="current-password">
        </div>
        <label class="check-row">
          <input id="remember" type="checkbox">
          <span>Энэ төхөөрөмж дээр намайг сана</span>
        </label>
        <button class="btn btn-primary" type="submit" style="width:100%">Нэвтрэх</button>
      </form>
    </section>

    <p class="footer-note">© 2026 ГОВЬ РЕСУРС ДЕВЕЛОПМЕНТ ХХК</p>
  </main>
  <script src="app.js"></script>
</body>
</html>
