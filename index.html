<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Говь Ресурс Девелопмент ХХК — Нэвтрэх</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="brand-block">
      <div class="brand-logo" aria-hidden="true">
        <svg class="logo-mark" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 5 59 55H43L32 35 21 55H5L32 5Z" fill="white" opacity=".96"/>
          <path d="M32 18 44 42H20L32 18Z" fill="#c9202f"/>
          <path d="M9 55h46L42 43H22L9 55Z" fill="white" opacity=".96"/>
        </svg>
      </div>
      <h1 class="brand-title">ГОВЬ РЕСУРС ДЕВЕЛОПМЕНТ ХХК</h1>
      <p class="brand-subtitle">Өдөр тутмын үйл ажиллагааны систем</p>
    </section>

    <section class="login-card">
      <div class="login-head">
        <h1>Нэвтрэх</h1>
        <p>Системд нэвтрэхийн тулд мэдээллээ оруулна уу.</p>
      </div>
      <form id="loginForm" class="form-grid" autocomplete="on">
        <div id="loginMessage"></div>
        <div class="field">
          <label for="username">Нэвтрэх нэр</label>
          <div class="input-wrap">
            <span class="icon">☻</span>
            <input id="username" name="username" type="text" placeholder="Хэрэглэгчийн нэр" required>
          </div>
        </div>
        <div class="field">
          <label for="pin">PIN код</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input id="pin" name="pin" type="password" inputmode="numeric" placeholder="PIN кодоо оруулна уу" required>
          </div>
        </div>
        <label class="check-row">
          <input id="remember" type="checkbox">
          <span>Намайг сана</span>
        </label>
        <button class="btn btn-primary" type="submit">Нэвтрэх</button>
        <div class="divider">эсвэл</div>
        <a class="btn btn-soft" href="report.html">Тайлан оруулах хуудас руу очих</a>
      </form>
    </section>
    <footer class="footer-note">© 2026 Говь Ресурс Девелопмент ХХК. Бүх эрх хуулиар хамгаалагдсан.</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
