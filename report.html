<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Тайлан оруулах — GRD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-body" data-page="report">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="top-brand" href="report.html">
        <span class="mini-logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M32 5 59 55H43L32 35 21 55H5L32 5Z" fill="white"/><path d="M32 18 44 42H20L32 18Z" fill="#c9202f"/><path d="M9 55h46L42 43H22L9 55Z" fill="white"/></svg>
        </span>
        <span><h1>Тайлан илгээх</h1><p>Говь Ресурс Девелопмент ХХК</p></span>
      </a>
      <div class="top-actions">
        <a class="btn btn-soft" href="dashboard.html">Dashboard</a>
        <span id="userPill" class="user-pill"></span>
        <button id="logoutBtn" class="btn btn-soft hidden">Гарах</button>
      </div>
    </div>
  </header>

  <main class="report-shell">
    <section id="reportWorkspace" class="hidden">
      <section class="hero">
        <div class="hero-row">
          <div>
            <h2>Өдрийн тайлан</h2>
            <p>Огноогоо шалгаад, тайлангаа бөглөж илгээнэ үү.</p>
          </div>
          <div class="date-tools">
            <input id="reportDate" type="date">
          </div>
        </div>
      </section>

      <section id="reportPicker" class="panel">
        <div class="panel-head">
          <div>
            <h3>Тайлангийн төрөл</h3>
            <p>Зөвхөн таны оруулах эрхтэй тайлангууд харагдана.</p>
          </div>
        </div>
        <div id="allowedReports" class="permission-grid"></div>
      </section>

      <section id="formPanel" class="panel hidden">
        <div class="panel-head">
          <div>
            <h3 id="formTitle">Тайлан</h3>
            <p id="formDesc">Мэдээллээ бөглөөд илгээнэ.</p>
          </div>
        </div>
        <div id="submitMessage"></div>
        <form id="dynamicReportForm" class="dynamic-form"></form>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
