<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хэрэглэгчийн удирдлага — GRD</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="admin">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="nameplate" href="dashboard.html">
        <span class="nameplate-mark" aria-hidden="true"><img src="logo.png" alt="" width="38" height="38" style="display:block;border-radius:9px"></span>        <span class="nameplate-text"><h1>Говь Ресурс Девелопмент</h1><p>Хэрэглэгчийн удирдлага</p></span>
      </a>
      <div class="top-actions">
        <a class="btn btn-soft" href="report.html">Тайлан</a>
        <a class="btn btn-soft" href="dashboard.html">Хяналтын самбар</a>
        <span id="userPill" class="user-pill"></span>
        <button id="logoutBtn" class="btn btn-soft hidden">Гарах</button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="bezel hero"><span class="tick-a"></span><span class="tick-b"></span>
      <p class="eyebrow">Админ</p>
      <h2>Хэрэглэгчийн удирдлага</h2>
      <p>Ажилтнуудын нэвтрэх PIN кодыг эндээс солино. PIN солигдмогц тухайн ажилтан шинэ кодоороо нэвтэрнэ.</p>
    </section>

    <div id="adminMessage"></div>

    <section class="bezel panel"><span class="tick-a"></span><span class="tick-b"></span>
      <div class="panel-head">
        <div><h3>Хэрэглэгчид</h3><p>«PIN солих» дээр дарж 4-8 оронтой шинэ код оруулна.</p></div>
      </div>
      <div id="userList"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
